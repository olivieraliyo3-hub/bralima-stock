<section>
<table border="1" width="100%" cellpadding="10">
<thead>
<tr>
<th>Boisson</th>
<th>Type</th>
<th>Quantité</th>
<th>Date</th>
</tr>
</thead>
<tbody id="tableHistorique"></tbody>
</table>
</section>

<script src="script.js"></script>

<script>
function afficherHistorique(){
    let historique = getHistorique();
    let table = document.getElementById("tableHistorique");
    table.innerHTML="";

    historique.forEach(h=>{
        table.innerHTML += `
        <tr>
        <td>${h.nom}</td>
        <td>${h.type}</td>
        <td>${h.quantite}</td>
        <td>${h.date}</td>
        </tr>
        `;
    });
}
</script>

</body>
